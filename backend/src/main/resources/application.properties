# Backend Configuration
server.port=8080

# API Key Configuration (Ollama - Local LLM)
# Key 仅作占位（本地 Ollama 通常不需要鉴权，如有需要可填入）
ai.api-key=7a588afcb639405c96579317fa983b4b.5yZkjBa7f19w5Vij4UMm78UU
# Ollama 标准 Chat 接口地址
ai.api-url=http://localhost:11434/api/chat
# 本地 Ollama 已下载的模型名称（请根据 ollama list 的结果修改）
ai.model=qwen2.5:latest

# Database Configuration (H2 in-memory for quick demo, switch to PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:student_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# Logging
logging.level.com.studentaffairs.backend=DEBUG
