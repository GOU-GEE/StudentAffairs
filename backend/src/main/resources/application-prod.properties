# ==================== 生产环境数据库配置 (PostgreSQL) ====================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:student_db}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:student_user}
spring.datasource.password=${DB_PASSWORD:zxcvbnm}

# JPA/Hibernate 配置
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# 开启 SQL 日志便于排查问题（可选，生产环境可设为 WARN）
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
